<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem peminjaman Perpustakaan</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📖</text></svg>">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-slate-50 text-slate-800 font-sans antialiased">

    <div class="flex min-h-screen">
                <aside class="w-64 bg-slate-900 text-slate-200 flex flex-col justify-between">
        
        <div>
            <!-- Logo -->
            <div class="p-6 border-b border-slate-800">
                <div class="bg-blue-600 text-white w-8 h-8 rounded-lg flex items-center justify-center font-bold">
                    <i class="fa-solid fa-book-open"></i>
                </div>
                <h1 class="text-sm tracking-widest text-slate-400">SIPUSTAKA</h1>
                <h2 class="font-bold text-lg leading-tight">Sistem Peminjaman Buku</h2>
            </div>

            <!-- Menu -->
            <nav class="mt-6 space-y-2 px-4">
                <a href="{% url 'dashboard' %}" class="flex items-center gap-3 px-4 py-2 rounded-xl bg-slate-800">
                    <i class="fa-solid fa-house"></i> Dashboard
                </a>
                <a href="{% url 'list_buku' %}" class="flex items-center gap-3 px-4 py-2 hover:bg-slate-800 rounded-xl">
                    <i class="fa-solid fa-book"></i> Buku
                </a>
                <a href="{% url 'list_peminjaman' %}" class="flex items-center gap-3 px-4 py-2 hover:bg-slate-800 rounded-xl">
                    <i class="fa-solid fa-repeat"></i> Peminjaman
                </a>
                <a href="{% url 'list_user' %}" class="flex items-center gap-3 px-4 py-2 hover:bg-slate-800 rounded-xl">
                    <i class="fa-solid fa-user"></i> User
                </a>
            </nav>
        </div>

        <!-- User -->
        <div class="p-4">
            <div class="bg-slate-800 p-4 rounded-xl text-sm">
                <p class="text-slate-400">Admin Aktif</p>
                <p class="font-semibold">Thufail</p>
            </div>
        </div>

    </aside>

        <main class="flex-1 p-10 max-h-screen overflow-y-auto">
            {% block content %}
            {% endblock %}
        </main>
    </div>

</body>
</html>
